services:
  # Service API FastAPI & MQTT Worker
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fit4110-api-demo-day
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s